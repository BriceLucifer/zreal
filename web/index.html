<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zreal — Space Shooter</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#05060a;overflow:hidden;height:100vh;cursor:crosshair;
         font-family:-apple-system,sans-serif;color:#ccc}
    #canvas{width:100vw;height:100vh;display:block}
    .p{position:fixed;background:rgba(5,6,14,0.8);backdrop-filter:blur(10px);
       border:1px solid rgba(80,120,255,0.08);border-radius:10px;padding:12px 16px}
    #hud{top:12px;left:12px}
    #score{font-size:36px;font-weight:900;letter-spacing:-2px;
           font-family:'SF Mono',monospace;color:#fff;
           text-shadow:0 0 20px rgba(80,160,255,0.5)}
    #combo{font-size:20px;font-weight:800;min-height:26px;
           background:linear-gradient(90deg,#fa4,#f64);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
           filter:drop-shadow(0 0 8px rgba(255,100,60,0.5));transition:opacity .3s}
    #wave{font-size:12px;color:#68a;margin-top:4px;letter-spacing:1px}
    #hp{font-size:22px;margin-top:4px;letter-spacing:2px}
    #state{font-size:16px;color:#fa5;font-weight:700;margin-top:8px;
           text-shadow:0 0 12px rgba(255,160,60,0.5);transition:opacity .5s}
    #info{bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;color:#446;pointer-events:none}
    #fps-box{top:12px;right:12px;font-family:'SF Mono',monospace;font-size:11px;color:#335;pointer-events:none}
    #powerups{top:12px;left:50%;transform:translateX(-50%);font-size:12px;color:#aac;pointer-events:none;
              display:flex;gap:12px}
    .pw{padding:4px 10px;border-radius:6px;font-weight:600;font-size:11px;opacity:0;transition:opacity .3s}
    .pw.on{opacity:1}
    .pw-triple{background:rgba(255,200,50,0.15);color:#fc3;border:1px solid rgba(255,200,50,0.3)}
    .pw-shield{background:rgba(60,120,255,0.15);color:#48f;border:1px solid rgba(60,120,255,0.3)}
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="p" id="hud">
    <div id="score">0</div>
    <div id="combo"></div>
    <div id="wave">WAVE 0</div>
    <div id="hp">♥♥♥</div>
    <div id="state"></div>
  </div>
  <div class="p" id="info">Move mouse to fly · Auto-fire · R = Restart · Zig WASM SIMD + WebGL2</div>
  <div class="p" id="fps-box"><span id="fps">—</span></div>
  <script src="engine.js"></script>
  <script>
    let fc=0,lt=performance.now();
    !function t(){fc++;const n=performance.now();if(n-lt>=1e3){document.getElementById("fps").textContent=fc+" FPS";fc=0;lt=n}requestAnimationFrame(t)}();
    ZReal.init("canvas");
  </script>
</body>
</html>
